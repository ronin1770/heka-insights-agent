services:
  otel-collector:
    image: otel/opentelemetry-collector:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./tests/docker/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318"

  test-runner:
    build:
      context: .
      dockerfile: tests/docker/Dockerfile.test

    working_dir: /usr/local/development/heka-insights-agent

    environment:
      PYTHONPATH: /usr/local/development/heka-insights-agent/src
      EXPORTER_TYPE: otlp_http
      OTLP_HTTP_ENDPOINT: http://otel-collector:4318/v1/metrics
      CPU_POLL_INTERVAL_SECONDS: "1"
      LOG_LOCATION: /tmp/heka_agent.log

      RUN_OTLP_INTEGRATION: "1"
      OTELCOL_IMAGE: otel/opentelemetry-collector-contrib:latest
      OTLP_IT_BASE_PORT: "14318"
      OTLP_IT_HOST: host.docker.internal

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/usr/local/development/heka-insights-agent

    depends_on:
      - otel-collector