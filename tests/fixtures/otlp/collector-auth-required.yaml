extensions:
  bearertokenauth/ingress:
    token: "abcd1234"
    header: "key"
    scheme: "Bearer"

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth/ingress

exporters:
  debug:

service:
  extensions: [bearertokenauth/ingress]
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [debug]
